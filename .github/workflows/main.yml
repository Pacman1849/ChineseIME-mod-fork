name: Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Native DLL
        run: |
          cmake -S native -B native/build -DCMAKE_BUILD_TYPE=Release
          cmake --build native/build --config Release
          # CMake outputs to native/build/ directory
          if (!(Test-Path "natives/Release")) {
              New-Item -ItemType Directory -Path "natives/Release" -Force
          }
          Copy-Item "native/build/chineseime_native.dll" "natives/Release/" -Force

      - name: Build JAR
        run: ./gradlew build
